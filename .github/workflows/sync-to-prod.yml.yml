name: Sync main to databricks-test

# Trigger: automatic on push to main, or manual run
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout main-repo
      - name: Checkout main-repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # full history required for push

      # Step 2: Setup Git identity for commit
      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      # Step 3: Push to databricks-test
      - name: Push to databricks-test
        env:
          TOKEN: ${{ secrets.REPO_SYNC_TOKEN }}
        run: |
          git remote add mirror https://${TOKEN}@github.com/databricks-learning-for-capy/databricks-test.git
          git push mirror main --force
