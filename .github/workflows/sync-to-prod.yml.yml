name: Sync main to main-repo

# Trigger: run when main is updated
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout Repo-A
      - name: Checkout Repo-A
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # fetch full history

      # Step 2: Configure Git with a bot name/email
      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      # Step 3: Push changes to main-repo
      - name: Push to main-repo
        env:
          REPO_B: https://github.com/databricks-learning-for-capy/databricks-prod.git
          TOKEN: ${{ secrets.REPO_SYNC_TOKEN }}
        run: |
          git remote add mirror https://${TOKEN}@github.com/databricks-learning-for-capy/databricks-prod.git
          git push mirror main --force
