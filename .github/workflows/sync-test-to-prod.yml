name: Sync databricks-test to databricks-prod

on:
  push:
    branches:
      - main

  workflow_dispatch:   # 👈 allows manual run

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo (databricks-test)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to databricks-prod repo
        env:
          TARGET_REPO: databricks-learning-for-capy/databricks-prod
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git remote add prod https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git

          git push prod main --force
