name: Sync databricks-test to databricks-prod

on:
  push:
    branches:
      - databricks-test

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync test branch to prod branch
        run: |
          git checkout databricks-prod || git checkout -b databricks-prod
          git reset --hard origin/databricks-test
          git push origin databricks-prod --force
