name: Sync databricks-test to databricks-prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to databricks-prod
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git remote add prod https://github.com/databricks-learning-for-capy/databricks-prod.git

          git push prod main --force
