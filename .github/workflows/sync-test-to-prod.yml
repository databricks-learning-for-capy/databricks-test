name: Sync databricks-test to databricks-prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to databricks-prod
        run: |
          git config user.name "sync-bot"
          git config user.email "sync-bot@databricks-learning-for-capy"

          git remote add prod https://x-access-token:${{ secrets.PROD_PUSH_TOKEN }}@github.com/databricks-learning-for-capy/databricks-prod.git

          git push prod main --force
