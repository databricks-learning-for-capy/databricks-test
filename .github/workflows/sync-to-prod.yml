name: Sync DEV to PROD via PR

on:
  workflow_dispatch:         # Allows manual run for testing
  push:
    branches:
      - main                # Trigger automatically when DEV main is updated

jobs:
  create_pr:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout DEV repo (databricks-test)
      - name: Checkout databricks-test
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Step 2: Create a branch in main-repo and push changes
      - name: Create branch in main-repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git clone https://github.com/databricks-learning-for-capy/main-repo.git main-repo
          cd main-repo
          git checkout -b dev-sync
          cp -r ../* .      # copy all files from databricks-test
          git add .
          git commit -m "Sync from databricks-test"
          git push https://${{ secrets.REPO_SYNC_TOKEN }}@github.com/databricks-learning-for-capy/main-repo.git dev-sync

      # Step 3: Create Pull Request in main-repo
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.REPO_SYNC_TOKEN }}
          commit-message: "Sync from databricks-test"
          branch: dev-sync
          base: main
          title: "Sync DEV to PROD"
          body: "Automatic sync from databricks-test repo"
