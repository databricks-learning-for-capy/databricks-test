name: Sync DEV to PROD

on:
  pull_request:
    types: [closed]       # triggers when PR is merged or closed
    branches:
      - main

jobs:
  sync_to_prod:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # Checkout DEV repo (databricks-test)
      - name: Checkout databricks-test
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Push to main-repo using PAT secret
      - name: Push to main-repo
        uses: ad-m/github-push-action@v0.6.0
        with:
          repository: databricks-learning-for-capy/main-repo
          branch: main
          github_token: ${{ secrets.REPO_SYNC_TOKEN }}
          force: true
