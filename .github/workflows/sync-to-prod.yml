name: Sync DEV to PROD

on:
  workflow_dispatch:        # Allows manual run
  pull_request:
    types: [closed]        # Trigger when a PR is merged
    branches:
      - main

jobs:
  sync_to_prod:
    # Run if PR merged or manually triggered
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout DEV repo (databricks-test)
      - name: Checkout databricks-test
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Step 2: Push to main-repo using classic PAT
      - name: Push to main-repo
        uses: ad-m/github-push-action@v0.6.0
        with:
          repository: databricks-learning-for-capy/main-repo
          branch: main
          github_token: ${{ secrets.REPO_SYNC_TOKEN }}   # classic PAT secret
          force: true
          directory: .
