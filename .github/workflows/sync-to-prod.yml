name: Sync DEV to PROD via PR

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  create_pr:
    runs-on: ubuntu-latest

    steps:
      # Checkout DEV repo
      - name: Checkout DEV repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Create branch in main-repo and copy files safely
      - name: Create branch in main-repo
        run: |
          # Clone PROD repo
          git clone https://github.com/databricks-learning-for-capy/main-repo.git main-repo
          cd main-repo

          # Set Git identity locally
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Create new branch
          git checkout -b dev-sync

          # Copy DEV files safely, excluding cloned main-repo folder
          shopt -s extglob
          cp -r ../!(main-repo) .

          # Add, commit, and push using the PAT
          git add .
          git commit -m "Sync from databricks-test"
          git push https://${{ secrets.REPO_SYNC_TOKEN }}@github.com/databricks-learning-for-capy/main-repo.git dev-sync

      # Create Pull Request in main-repo
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.REPO_SYNC_TOKEN }}
          commit-message: "Sync from databricks-test"
          branch: dev-sync
          base: main
          title: "Sync DEV to PROD"
          body: "Automatic sync from databricks-test repo"
