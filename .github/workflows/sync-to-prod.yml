name: Push DEV to PROD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  push_to_prod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout databricks-test
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Authenticate GitHub CLI
        uses: cli/gh-action@v2
        with:
          token: ${{ secrets.REPO_SYNC_TOKEN }}

      - name: Push changes to main-repo
        run: |
          gh repo clone databricks-learning-for-capy/main-repo repo-prod
          cp -r ./* repo-prod/
          cd repo-prod
          git add .
          git commit -m "Sync from databricks-test"
          git push origin main
