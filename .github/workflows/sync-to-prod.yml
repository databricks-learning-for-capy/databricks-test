name: Push DEV to PROD

# Trigger: run manually or on push to main branch in databricks-test
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  push_to_prod:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout DEV repo (databricks-test)
      - name: Checkout databricks-test
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Step 2: Setup Git
      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      # Step 3: Push to main-repo
      - name: Push to main-repo
        env:
          TOKEN: ${{ secrets.REPO_SYNC_TOKEN }}
        run: |
          git remote add prod https://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@github.com/databricks-learning-for-capy/main-repo.git
          git push prod main --force
